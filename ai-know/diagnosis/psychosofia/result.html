const AXIS_LABELS = { W:"意志", E:"感情", L:"論理", F:"身体" };
const AXIS_COLORS = { W:"var(--axis-W)", E:"var(--axis-E)", L:"var(--axis-L)", F:"var(--axis-F)" };
const AXIS_MUTED  = { W:"var(--axis-W-muted)", E:"var(--axis-E-muted)", L:"var(--axis-L-muted)", F:"var(--axis-F-muted)" };
const RESULT_KEY  = 'aiknow_psychosofia_result';

// ─── Bootstrap ──────────────────────────────────────────────────────────────
function init() {
  const params  = new URLSearchParams(location.search);
  const urlType = params.get('type')?.toUpperCase();

  let typeCode  = null;
  let scores    = null;
  let isBorder  = false;

  if (urlType && TYPES[urlType]) {
    typeCode = urlType;
    // try to load scores from storage
    try {
      const saved = JSON.parse(localStorage.getItem(RESULT_KEY) || 'null');
      if (saved?.typeCode === typeCode) { scores = saved.scores; isBorder = saved.isBorder; }
    } catch(e) {}
  } else {
    // Try storage
    try {
      const saved = JSON.parse(localStorage.getItem(RESULT_KEY) || 'null');
      if (saved?.typeCode && TYPES[saved.typeCode]) {
        typeCode = saved.typeCode; scores = saved.scores; isBorder = saved.isBorder;
      }
    } catch(e) {}
  }

  if (!typeCode) { renderNotFound(); return; }
  renderResult(typeCode, scores, isBorder);
}

// ─── Render ──────────────────────────────────────────────────────────────────
function renderResult(code, scores, isBorder) {
  const t = TYPES[code];
  const dominant = t.dominant;
  const order = code.split('');

  // CSS variables for this type's axis color
  document.documentElement.style.setProperty('--type-color', `var(--axis-${dominant})`);
  document.documentElement.style.setProperty('--type-muted', AXIS_MUTED[dominant]);

  // OGP meta update
  const shareText = `私はサイコソフィア診断で「${t.name}（${code}）」でした！${t.catchcopy}`;
  document.getElementById('metaDesc').content = shareText;
  document.getElementById('ogTitle').content  = `${t.name}（${code}）| サイコソフィア診断 | AI-KNOW`;
  document.getElementById('ogDesc').content   = shareText;
  document.title = `${t.name}（${code}）| サイコソフィア診断`;

  const page = document.getElementById('pageContent');
  page.innerHTML = buildHTML(code, t, order, scores, isBorder);

  // Animate score bars after paint
  if (scores) {
    const maxScore = Math.max(...Object.values(scores));
    requestAnimationFrame(() => setTimeout(() => {
      order.forEach((axis, i) => {
        const bar = document.getElementById('scoreBar_' + axis);
        if (bar) bar.style.width = ((scores[axis] / maxScore) * 100) + '%';
      });
    }, 100));
  }

  // Wire up share & copy
  wireShare(code, t, shareText);
}

function buildHTML(code, t, order, scores, isBorder) {
  const dominant = t.dominant;

  // Function order chips
  const funcOrder = order.map((ax, i) => `
    <div class="func-rank">
      <span class="func-rank-num">${i+1}位</span>
      <span class="func-badge ${ax}">${AXIS_LABELS[ax]}</span>
    </div>
    ${i < 3 ? '<span class="func-arrow" aria-hidden="true">›</span>' : ''}
  `).join('');

  // Score section (only if scores available)
  const scoreHTML = scores ? (() => {
    const sorted = [...order].sort((a,b) => scores[b]-scores[a]);
    const maxScore = Math.max(...Object.values(scores));
    const rows = order.map(axis => {
      const rank = sorted.indexOf(axis) + 1;
      const pct  = Math.round((scores[axis] / maxScore) * 100);
      return `
        <div class="score-row">
          <span class="score-axis-label" style="color:${AXIS_COLORS[axis]}">${axis}</span>
          <span class="score-name">${AXIS_LABELS[axis]}</span>
          <div class="score-track"><div class="score-fill" id="scoreBar_${axis}" style="background:${AXIS_COLORS[axis]}"></div></div>
          <span class="score-val">${Math.round(scores[axis])}</span>
          <span class="rank-badge${rank===1?' first':''}">${rank}</span>
        </div>`;
    }).join('');
    return `
      <section class="score-section" aria-label="スコア詳細">
        <h2>4軸スコア</h2>${rows}
      </section>`;
  })() : '';

  // Border notice
  const borderHTML = isBorder ? `
    <div class="border-notice visible" role="alert">
      <strong>⚠ 境界タイプの可能性があります</strong>
      上位2軸のスコア差が小さいため、隣接タイプの側面も持っている可能性があります。
    </div>` : '';

  // Strengths / Challenges
  const strItems = t.str.map(s => `<li>${s}</li>`).join('');
  const chgItems = t.chg.map(c => `<li>${c}</li>`).join('');

  return `
    <section class="result-hero" aria-labelledby="typeName">
      <div class="type-code-big" aria-label="タイプコード ${code}">${code}</div>
      <h1 class="type-name-big" id="typeName">${t.name}</h1>
      <p class="type-catchcopy">${t.catchcopy}</p>
      <div class="func-order" aria-label="機能優先順位">${funcOrder}</div>
      <p class="type-desc">${t.desc}</p>
    </section>

    ${borderHTML}
    ${scoreHTML}

    <div class="str-chg" role="region" aria-label="強みと課題">
      <div class="str-card">
        <h2 class="str-chg-title">強み</h2>
        <ul class="str-chg-list" aria-label="強み一覧">${strItems}</ul>
      </div>
      <div class="chg-card">
        <h2 class="str-chg-title">成長課題</h2>
        <ul class="str-chg-list" aria-label="成長課題一覧">${chgItems}</ul>
      </div>
    </div>

    <section class="share-section" aria-label="結果をシェア">
      <h2>結果をシェア</h2>
      <div class="share-btns">
        <button class="share-btn share-btn-x" id="shareX" aria-label="Xでシェア">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          Xでシェア
        </button>
        <button class="share-btn share-btn-line" id="shareLINE" aria-label="LINEでシェア">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2C6.48 2 2 6.04 2 11.05c0 3.46 2.03 6.49 5.05 8.22.18.1.28.3.28.5l-.06 1.84c-.02.45.48.73.87.5l2.05-1.2c.14-.08.3-.1.46-.06.76.2 1.55.3 2.35.3 5.52 0 10-4.04 10-9.05S17.52 2 12 2z"/></svg>
          LINEでシェア
        </button>
        <button class="share-btn share-btn-copy" id="shareCopy" aria-label="リンクをコピー">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          リンクをコピー
        </button>
      </div>
      <p class="copy-feedback" id="copyFeedback" role="status" aria-live="polite">✓ コピーしました</p>
    </section>

    <div class="cta-wrap">
      <a href="quiz.html" class="btn-primary-full">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M4 4v5h5M16 16v-5h-5M4.1 9A8 8 0 0116 6M19.9 11A8 8 0 014 14"/></svg>
        もう一度診断する
      </a>
      <a href="lp.html" class="btn-secondary-full">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M10 2l8 8-8 8M2 10h16"/></svg>
        診断ページへ戻る
      </a>
    </div>`;
}

function renderNotFound() {
  document.getElementById('pageContent').innerHTML = `
    <div class="not-found" role="main">
      <h1>診断結果が見つかりません</h1>
      <p>まず診断を完了してください。</p>
      <a href="quiz.html" class="btn-primary-full" style="max-width:280px;margin:0 auto;">診断を始める</a>
    </div>`;
}

// ─── Share ───────────────────────────────────────────────────────────────────
function wireShare(code, t, shareText) {
  const url      = window.location.origin + window.location.pathname + `?type=${code}`;
  const tweetTxt = `${shareText} #サイコソフィア診断 #AIKNOW`;
  const lineTxt  = `${shareText}\n${url}`;

  document.getElementById('shareX')?.addEventListener('click', () => {
    window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(tweetTxt)}&url=${encodeURIComponent(url)}`, '_blank', 'noopener');
  });
  document.getElementById('shareLINE')?.addEventListener('click', () => {
    window.open(`https://line.me/R/msg/text/?${encodeURIComponent(lineTxt)}`, '_blank', 'noopener');
  });
  document.getElementById('shareCopy')?.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(url);
    } catch(e) {
      // fallback
      const ta = document.createElement('textarea');
      ta.value = url; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.focus(); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    const fb = document.getElementById('copyFeedback');
    fb.classList.add('visible');
    setTimeout(() => fb.classList.remove('visible'), 2500);
  });
}
