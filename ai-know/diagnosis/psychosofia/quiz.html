<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サイコソフィア診断 | AI-KNOW</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #080B14;
  --bg-primary: #0D1120;
  --bg-card: #1A2038;
  --bg-secondary: #131826;
  --border: #252D44;
  --border-subtle: #1C2234;
  --text-primary: #EDEBE4;
  --text-secondary: #9A9EB8;
  --text-muted: #565D7A;
  --brand: #C9A84C;
  --brand-light: #D9BC70;
  --axis-W: #E07B45;
  --axis-W-muted: rgba(224,123,69,.18);
  --axis-E: #C4668A;
  --axis-E-muted: rgba(196,102,138,.18);
  --axis-L: #5A9FD6;
  --axis-L-muted: rgba(90,159,214,.18);
  --axis-F: #6BAF8A;
  --axis-F-muted: rgba(107,175,138,.18);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100svh;
  display: flex; flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* ── Progress header ─────────────────── */
.quiz-header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  background: rgba(8,11,20,.92);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border-subtle);
  padding: 0 1.25rem;
}
.quiz-header-inner {
  max-width: 680px; margin: 0 auto;
  height: 56px;
  display: flex; align-items: center; justify-content: space-between; gap: 1rem;
}
.quiz-logo {
  font-family: 'Inter', sans-serif; font-weight: 700;
  font-size: .82rem; letter-spacing: .1em;
  color: var(--brand); white-space: nowrap;
  text-decoration: none;
}
.progress-wrap { flex: 1; }
.progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 4px;
}
.progress-fill {
  height: 100%; border-radius: 2px;
  background: var(--brand);
  width: 0;
  transition: width .4s ease, background-color .4s ease;
}
.progress-label {
  font-family: 'Inter', sans-serif; font-size: .7rem;
  color: var(--text-muted); text-align: right;
}
.progress-label span { color: var(--text-secondary); font-weight: 600; }

/* ── Main ────────────────────────────── */
.quiz-main {
  flex: 1;
  display: flex; flex-direction: column; justify-content: center;
  padding: 80px 1.25rem 2rem;
  max-width: 680px; width: 100%; margin: 0 auto;
  min-height: 100svh;
}

/* ── Resume banner ───────────────────── */
.resume-banner {
  display: none;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1rem 1.25rem;
  margin-bottom: 1.5rem;
  align-items: center; gap: 1rem;
  flex-wrap: wrap;
}
.resume-banner.visible { display: flex; }
.resume-banner p { font-size: .88rem; color: var(--text-secondary); flex: 1; }
.resume-banner strong { color: var(--text-primary); }
.btn-resume {
  background: var(--brand); color: #000;
  border: none; border-radius: 8px;
  padding: .45rem 1rem; font-weight: 700; font-size: .82rem;
  cursor: pointer; white-space: nowrap;
  transition: background .2s;
}
.btn-resume:hover { background: var(--brand-light); }
.btn-dismiss {
  background: none; border: 1px solid var(--border);
  color: var(--text-muted); border-radius: 8px;
  padding: .45rem 1rem; font-size: .82rem;
  cursor: pointer; white-space: nowrap;
  transition: border-color .2s, color .2s;
}
.btn-dismiss:hover { border-color: var(--text-secondary); color: var(--text-secondary); }

/* ── Question card ───────────────────── */
.question-wrap {
  position: relative;
  min-height: 180px;
}
.question-card {
  animation: slideUp .28s ease-out;
}
.question-card.exit {
  animation: slideDown .2s ease-in forwards;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes slideDown {
  from { opacity: 1; transform: translateY(0); }
  to   { opacity: 0; transform: translateY(-16px); }
}
@media (prefers-reduced-motion: reduce) {
  .question-card { animation: fadeIn .2s ease; }
  .question-card.exit { animation: fadeOut .15s ease forwards; }
  @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
  @keyframes fadeOut { from { opacity:1 } to { opacity:0 } }
}
.axis-dot {
  display: inline-block;
  width: 8px; height: 8px; border-radius: 50%;
  margin-bottom: .75rem;
}
.q-number {
  font-family: 'Inter', sans-serif; font-size: .72rem; font-weight: 600;
  color: var(--text-muted); letter-spacing: .1em;
  margin-bottom: .6rem;
}
.q-text {
  font-family: 'Noto Serif JP', serif;
  font-weight: 700;
  font-size: clamp(1.1rem, 3.5vw, 1.35rem);
  line-height: 1.65;
  color: var(--text-primary);
}

/* ── Scale ───────────────────────────── */
.scale-section {
  margin-top: 2.5rem;
}
.scale-row {
  display: flex; justify-content: center; gap: .45rem;
  margin-bottom: .85rem;
}
.scale-btn {
  width: 42px; height: 42px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: var(--bg-secondary);
  color: var(--text-secondary);
  font-family: 'Inter', sans-serif;
  font-size: .88rem; font-weight: 600;
  cursor: pointer;
  transition: border-color .18s, background .18s, color .18s, transform .18s, box-shadow .18s;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.scale-btn:hover {
  border-color: var(--current-axis, var(--brand));
  color: var(--current-axis, var(--brand));
  transform: scale(1.08);
}
.scale-btn.selected {
  background: var(--current-axis, var(--brand));
  border-color: var(--current-axis, var(--brand));
  color: #fff;
  transform: scale(1.1);
  box-shadow: 0 0 14px rgba(0,0,0,.3);
}
.scale-btn:focus-visible {
  outline: 2px solid var(--brand);
  outline-offset: 3px;
}
.scale-labels {
  display: flex; justify-content: space-between;
  font-size: .72rem; color: var(--text-muted);
  padding: 0 2px;
  line-height: 1.4;
}
.scale-mid {
  text-align: center;
  font-size: .7rem; color: var(--text-muted);
  margin-top: .4rem;
}

/* ── Navigation ──────────────────────── */
.quiz-nav {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 2.5rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--border-subtle);
}
.btn-back {
  background: none; border: none;
  color: var(--text-muted); font-size: .88rem;
  cursor: pointer; padding: .5rem;
  display: flex; align-items: center; gap: .4rem;
  transition: color .2s;
  border-radius: 6px;
}
.btn-back:hover { color: var(--text-secondary); }
.btn-back:focus-visible { outline: 2px solid var(--brand); outline-offset: 3px; }
.btn-back:disabled { opacity: .3; pointer-events: none; }

/* ── Calculating screen ──────────────── */
.calc-screen {
  display: none;
  flex-direction: column; align-items: center; justify-content: center;
  min-height: 60vh; text-align: center; gap: 1.5rem;
  padding: 2rem;
}
.calc-screen.visible { display: flex; }
.calc-spinner {
  width: 56px; height: 56px;
  border: 3px solid var(--border);
  border-top-color: var(--brand);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.calc-title {
  font-family: 'Noto Serif JP', serif;
  font-weight: 700; font-size: 1.35rem;
}
.calc-sub { color: var(--text-secondary); font-size: .9rem; }

/* ── Axis bar (score visualization) ─── */
.axis-bars { width: 100%; max-width: 320px; }
.axis-bar-row {
  display: flex; align-items: center; gap: .75rem;
  margin-bottom: .6rem;
}
.axis-bar-label {
  font-family: 'Inter', sans-serif; font-weight: 700;
  font-size: .78rem; width: 24px; flex-shrink: 0;
}
.axis-bar-track {
  flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
}
.axis-bar-fill {
  height: 100%; border-radius: 3px; width: 0;
  transition: width .8s cubic-bezier(.16,1,.3,1);
}

/* ── Responsive ──────────────────────── */
@media (min-width: 640px) {
  .quiz-main { padding: 90px 2rem 3rem; }
  .scale-btn { width: 46px; height: 46px; }
  .scale-row { gap: .6rem; }
}
</style>
</head>
<body>

<!-- Header -->
<header class="quiz-header" role="banner">
  <div class="quiz-header-inner">
    <a href="lp.html" class="quiz-logo">AI-KNOW</a>
    <div class="progress-wrap" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="32" id="progressRegion" aria-label="診断進捗">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-label"><span id="progressText">0</span> / 32</div>
    </div>
  </div>
</header>

<!-- Main quiz area -->
<main class="quiz-main" id="quizMain">
  <!-- Resume banner -->
  <div class="resume-banner" id="resumeBanner" role="alert">
    <p>前回の途中 (<strong id="resumeCount">0</strong>/32問) から再開できます。</p>
    <button class="btn-resume" id="btnResume">再開する</button>
    <button class="btn-dismiss" id="btnDismiss">最初から</button>
  </div>

  <!-- Question area -->
  <div class="question-wrap" id="questionWrap">
    <div class="question-card" id="questionCard">
      <div class="axis-dot" id="axisDot"></div>
      <p class="q-number" id="qNumber"></p>
      <p class="q-text" id="qText"></p>
    </div>
  </div>

  <!-- Scale -->
  <div class="scale-section" id="scaleSection">
    <div class="scale-row" role="radiogroup" aria-labelledby="qText" id="scaleRow">
      <!-- Rendered by JS -->
    </div>
    <div class="scale-labels" aria-hidden="true">
      <span>全くあてはまらない</span>
      <span>非常にあてはまる</span>
    </div>
    <div class="scale-mid" aria-hidden="true">— どちらでもない（4）—</div>
  </div>

  <!-- Navigation -->
  <div class="quiz-nav">
    <button class="btn-back" id="btnBack" disabled>
      <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M16 10H4M10 4l-6 6 6 6"/></svg>
      前の質問
    </button>
    <span></span>
  </div>
</main>

<!-- Calculating screen -->
<div class="calc-screen" id="calcScreen" role="status" aria-live="polite">
  <div class="calc-spinner" aria-hidden="true"></div>
  <h2 class="calc-title">集計中…</h2>
  <p class="calc-sub">4つの機能スコアを算出しています</p>
  <div class="axis-bars" id="axisBars" aria-hidden="true">
    <div class="axis-bar-row">
      <span class="axis-bar-label" style="color:var(--axis-W)">W</span>
      <div class="axis-bar-track"><div class="axis-bar-fill" id="barW" style="background:var(--axis-W)"></div></div>
    </div>
    <div class="axis-bar-row">
      <span class="axis-bar-label" style="color:var(--axis-E)">E</span>
      <div class="axis-bar-track"><div class="axis-bar-fill" id="barE" style="background:var(--axis-E)"></div></div>
    </div>
    <div class="axis-bar-row">
      <span class="axis-bar-label" style="color:var(--axis-L)">L</span>
      <div class="axis-bar-track"><div class="axis-bar-fill" id="barL" style="background:var(--axis-L)"></div></div>
    </div>
    <div class="axis-bar-row">
      <span class="axis-bar-label" style="color:var(--axis-F)">F</span>
      <div class="axis-bar-track"><div class="axis-bar-fill" id="barF" style="background:var(--axis-F)"></div></div>
    </div>
  </div>
</div>

<script>
// ─── Question data (32 questions, WELF×8 round-robin) ──────────────────────
const QUESTIONS = [
  { id:"q01", axis:"W", text:"一度決めたことは、周囲の反対があっても最後まで貫き通す", weight:1.4, direction:1, reversed:false, contributions:[{axis:"L",weight:0.3}] },
  { id:"q02", axis:"E", text:"感情を率直に言葉や表情に出すことに、抵抗を感じない", weight:1.4, direction:1, reversed:false, contributions:[] },
  { id:"q03", axis:"L", text:"問題に直面したとき、まず情報を整理して論理的に分析する", weight:1.4, direction:1, reversed:false, contributions:[{axis:"W",weight:0.3}] },
  { id:"q04", axis:"F", text:"身体的な感覚（疲れ・痛み・快感）に敏感で、よく意識する", weight:1.3, direction:1, reversed:false, contributions:[] },
  { id:"q05", axis:"W", text:"重要な決断をするとき、他者の承認が得られるまで行動を保留することが多い", weight:1.2, direction:-1, reversed:true, contributions:[] },
  { id:"q06", axis:"E", text:"場の雰囲気や他者の感情の変化に、敏感に気づく方だ", weight:1.2, direction:1, reversed:false, contributions:[{axis:"F",weight:0.3}] },
  { id:"q07", axis:"L", text:"複雑な事柄を、体系的に構造化して考えることが得意だ", weight:1.5, direction:1, reversed:false, contributions:[] },
  { id:"q08", axis:"F", text:"食事・睡眠・空間の心地よさなど、物質的な環境を整えることを大切にしている", weight:1.2, direction:1, reversed:false, contributions:[] },
  { id:"q09", axis:"W", text:"困難な状況でも、自分の内面の力で乗り越えられると感じる", weight:1.3, direction:1, reversed:false, contributions:[] },
  { id:"q10", axis:"E", text:"感情的な表現よりも、事実や論理で物事を伝えることを好む", weight:1.1, direction:-1, reversed:true, contributions:[] },
  { id:"q11", axis:"L", text:"データや根拠のない主張よりも、論理的な根拠に基づく議論を好む", weight:1.3, direction:1, reversed:false, contributions:[] },
  { id:"q12", axis:"F", text:"体の状態を無視してでも、アイデアや思考に没頭することが多い", weight:1.0, direction:-1, reversed:true, contributions:[] },
  { id:"q13", axis:"W", text:"物事の方向性を他者に委ねることに、居心地の悪さを感じる", weight:1.3, direction:1, reversed:false, contributions:[] },
  { id:"q14", axis:"E", text:"相手の気持ちに共感したとき、自分の感情も同じように動く", weight:1.3, direction:1, reversed:false, contributions:[{axis:"F",weight:0.3}] },
  { id:"q15", axis:"L", text:"効率や合理性よりも、感情や気分を優先して行動することが多い", weight:1.0, direction:-1, reversed:true, contributions:[] },
  { id:"q16", axis:"F", text:"美しいものや心地よいものに囲まれた環境が、自分のパフォーマンスに大きく影響する", weight:1.2, direction:1, reversed:false, contributions:[{axis:"E",weight:0.3}] },
  { id:"q17", axis:"W", text:"他人から「こうすべき」と強く言われると、むしろ反発したくなる", weight:1.0, direction:1, reversed:false, contributions:[] },
  { id:"q18", axis:"E", text:"自分の内側で何かが揺れているとき、それを表現せずにはいられない", weight:1.3, direction:1, reversed:false, contributions:[] },
  { id:"q19", axis:"L", text:"矛盾や論理的な誤りに気づくと、そのままにしておくことができない", weight:1.1, direction:1, reversed:false, contributions:[] },
  { id:"q20", axis:"F", text:"体を動かすこと（運動・手作業・散歩）で、気持ちが整うことが多い", weight:1.1, direction:1, reversed:false, contributions:[] },
  { id:"q21", axis:"W", text:"自分の価値観や信念は、状況が変わっても揺らぎにくい", weight:1.2, direction:1, reversed:false, contributions:[{axis:"L",weight:0.3}] },
  { id:"q22", axis:"E", text:"喜びや悲しみを周囲と共有したいという欲求が強い", weight:1.2, direction:1, reversed:false, contributions:[] },
  { id:"q23", axis:"L", text:"直感や感覚よりも、順序立てた思考プロセスを信頼する", weight:1.2, direction:1, reversed:false, contributions:[] },
  { id:"q24", axis:"F", text:"感覚的な経験（味・音・手触り）を細かく味わうことが多い", weight:1.2, direction:1, reversed:false, contributions:[] },
  { id:"q25", axis:"W", text:"長期的な目標よりも、その場の流れに身を任せることの方が多い", weight:1.1, direction:-1, reversed:true, contributions:[] },
  { id:"q26", axis:"E", text:"感情的になっている人を見ると、関与せず距離を置きたくなる", weight:1.0, direction:-1, reversed:true, contributions:[] },
  { id:"q27", axis:"L", text:"新しい概念や仕組みを学ぶとき、原理・原則から理解しようとする", weight:1.2, direction:1, reversed:false, contributions:[] },
  { id:"q28", axis:"F", text:"実際に手を動かして体験することで、物事をより深く理解できる", weight:1.2, direction:1, reversed:false, contributions:[{axis:"L",weight:0.3}] },
  { id:"q29", axis:"W", text:"自分の意志よりも、周囲の期待や意向を優先して行動することが多い", weight:1.2, direction:-1, reversed:true, contributions:[] },
  { id:"q30", axis:"E", text:"感情よりも理性が、自分の最終的な判断をコントロールしていると感じる", weight:1.1, direction:-1, reversed:true, contributions:[] },
  { id:"q31", axis:"L", text:"思いつきやその場の勢いで行動することが多い", weight:1.0, direction:-1, reversed:true, contributions:[] },
  { id:"q32", axis:"F", text:"物事の実用性や具体的な感触よりも、抽象的なアイデアや概念を重視する", weight:1.0, direction:-1, reversed:true, contributions:[] }
];

const TOTAL = QUESTIONS.length;
const STORAGE_KEY = 'aiknow_psychosofia_progress';
const RESULT_KEY  = 'aiknow_psychosofia_result';
const AXIS_COLORS = { W:'var(--axis-W)', E:'var(--axis-E)', L:'var(--axis-L)', F:'var(--axis-F)' };

// ─── State ──────────────────────────────────────────────────────────────────
let state = { currentIndex: 0, answers: {}, sessionId: null };
let advanceTimer = null;

// ─── Init ───────────────────────────────────────────────────────────────────
function init() {
  const saved = loadProgress();
  const answeredCount = saved ? Object.keys(saved.answers).length : 0;

  if (saved && answeredCount > 0 && answeredCount < TOTAL) {
    // Show resume banner
    document.getElementById('resumeCount').textContent = answeredCount;
    const banner = document.getElementById('resumeBanner');
    banner.classList.add('visible');

    document.getElementById('btnResume').addEventListener('click', () => {
      state = saved;
      banner.classList.remove('visible');
      renderQuestion(state.currentIndex);
    });
    document.getElementById('btnDismiss').addEventListener('click', () => {
      clearProgress();
      banner.classList.remove('visible');
      renderQuestion(0);
    });
    // Show first question in background
    renderQuestion(0, false);
  } else {
    clearProgress();
    renderQuestion(0);
  }

  // Build scale buttons
  buildScale();
  document.getElementById('btnBack').addEventListener('click', goBack);
}

// ─── Build scale ────────────────────────────────────────────────────────────
function buildScale() {
  const row = document.getElementById('scaleRow');
  for (let v = 1; v <= 7; v++) {
    const btn = document.createElement('button');
    btn.className = 'scale-btn';
    btn.textContent = v;
    btn.dataset.value = v;
    btn.setAttribute('role', 'radio');
    btn.setAttribute('aria-checked', 'false');
    btn.setAttribute('aria-label', v === 1 ? `${v}: 全くあてはまらない` : v === 4 ? `${v}: どちらでもない` : v === 7 ? `${v}: 非常にあてはまる` : String(v));
    btn.addEventListener('click', () => selectAnswer(v));
    btn.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); focusBtn(v < 7 ? v : 7); }
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); focusBtn(v > 1 ? v - 1 : 1); }
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectAnswer(v); }
    });
    row.appendChild(btn);
  }
}

function focusBtn(val) {
  document.querySelector(`.scale-btn[data-value="${val}"]`)?.focus();
}

// ─── Render question ─────────────────────────────────────────────────────────
function renderQuestion(index, animate = true) {
  const q = QUESTIONS[index];
  if (!q) return;

  state.currentIndex = index;

  // Axis color
  const color = AXIS_COLORS[q.axis];
  document.documentElement.style.setProperty('--current-axis', `var(--axis-${q.axis})`);
  document.getElementById('axisDot').style.background = color;
  document.getElementById('qNumber').textContent = `Q ${index + 1} / ${TOTAL}`;
  document.getElementById('qText').textContent = q.text;

  // Progress
  const pct = (index / TOTAL) * 100;
  const fill = document.getElementById('progressFill');
  fill.style.width = pct + '%';
  // Progress bar color follows axis
  fill.style.background = `var(--axis-${q.axis})`;
  document.getElementById('progressText').textContent = index;
  const region = document.getElementById('progressRegion');
  region.setAttribute('aria-valuenow', index);

  // Restore saved answer
  const saved = state.answers[q.id];
  updateScaleBtns(saved || null);

  // Back button
  document.getElementById('btnBack').disabled = index === 0;

  // Animation
  if (animate) {
    const card = document.getElementById('questionCard');
    card.classList.remove('exit');
    card.style.animation = 'none';
    card.offsetHeight; // reflow
    card.style.animation = '';
  }
}

function updateScaleBtns(selected) {
  document.querySelectorAll('.scale-btn').forEach(btn => {
    const active = selected && parseInt(btn.dataset.value) === selected;
    btn.classList.toggle('selected', active);
    btn.setAttribute('aria-checked', active ? 'true' : 'false');
  });
}

// ─── Answer ──────────────────────────────────────────────────────────────────
function selectAnswer(value) {
  if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }

  const q = QUESTIONS[state.currentIndex];
  state.answers[q.id] = value;
  saveProgress();
  updateScaleBtns(value);

  advanceTimer = setTimeout(() => {
    if (state.currentIndex < TOTAL - 1) {
      transitionTo(state.currentIndex + 1);
    } else {
      finishQuiz();
    }
  }, 320);
}

function transitionTo(nextIndex) {
  const card = document.getElementById('questionCard');
  card.classList.add('exit');
  setTimeout(() => {
    card.classList.remove('exit');
    renderQuestion(nextIndex);
  }, 200);
}

function goBack() {
  if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }
  if (state.currentIndex > 0) transitionTo(state.currentIndex - 1);
}

// ─── Finish & calculate ───────────────────────────────────────────────────────
function finishQuiz() {
  // Hide quiz UI, show calc screen
  document.getElementById('quizMain').style.display = 'none';
  const calcScreen = document.getElementById('calcScreen');
  calcScreen.classList.add('visible');

  // Update progress to 100%
  const fill = document.getElementById('progressFill');
  fill.style.width = '100%';
  fill.style.background = 'var(--brand)';
  document.getElementById('progressText').textContent = TOTAL;

  // Compute scores
  const scores = calculateScores();
  const maxScore = Math.max(...Object.values(scores));

  // Animate bars
  setTimeout(() => {
    ['W','E','L','F'].forEach(axis => {
      const bar = document.getElementById('bar' + axis);
      bar.style.width = ((scores[axis] / maxScore) * 100) + '%';
    });
  }, 200);

  // Determine type
  const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);
  const typeCode = sorted.map(([k]) => k).join('');

  // Border type check (top-2 difference < 5% of max theoretical)
  const maxTheoretical = 8 * 7 * 1.5; // 84
  const isBorder = (sorted[0][1] - sorted[1][1]) / maxTheoretical < 0.05;

  // Save result
  const result = {
    typeCode,
    scores,
    isBorder,
    completedAt: new Date().toISOString(),
    sessionId: state.sessionId
  };
  localStorage.setItem(RESULT_KEY, JSON.stringify(result));
  clearProgress();

  // Redirect after animation
  setTimeout(() => {
    window.location.href = `result.html?type=${typeCode}`;
  }, 1800);
}

function calculateScores() {
  const scores = { W:0, E:0, L:0, F:0 };
  QUESTIONS.forEach(q => {
    const raw = state.answers[q.id];
    if (!raw) return;
    const adjusted = q.direction === 1 ? raw : (8 - raw);
    scores[q.axis] += adjusted * q.weight;
    q.contributions.forEach(c => { scores[c.axis] += adjusted * c.weight; });
  });
  return scores;
}

// ─── LocalStorage ────────────────────────────────────────────────────────────
function saveProgress() {
  if (!state.sessionId) state.sessionId = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36);
  const data = { ...state, savedAt: new Date().toISOString() };
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const data = JSON.parse(raw);
    // Expire after 7 days
    if (data.savedAt && Date.now() - new Date(data.savedAt).getTime() > 7*24*60*60*1000) {
      localStorage.removeItem(STORAGE_KEY); return null;
    }
    return data;
  } catch(e) { return null; }
}

function clearProgress() {
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
}

init();
</script>
